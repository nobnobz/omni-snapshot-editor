<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-wrap: wrap; gap: 20px; background: #333; }
        .icon-container {
            width: 512px;
            height: 512px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .dark { background-color: #020617; }
        .light { background-color: #ffffff; }
        img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transform: scale(1.15); /* Slightly more zoom for better fill */
        }
    </style>
</head>
<body>
    <div id="dark-container" class="icon-container dark">
        <img src="/omni-snapshot-editor/omni-icon-dark.png" />
    </div>
    <div id="light-container" class="icon-container light">
        <img src="/omni-snapshot-editor/omni-icon-light.png" />
    </div>
</body>
</html>
